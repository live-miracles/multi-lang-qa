<!doctype html>
<html lang="en" data-theme="dim">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi Lang QA</title>
    <script>
      (function () {
        var t = localStorage.getItem('theme') || 'dim';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>

    <link rel="icon" type="image/png" href="./logo.png" />
    <link rel="stylesheet" href="./output.css" />
    <script src="./bundle.umd.min.js"></script>
    <script crossorigin src="./test-utils.js" defer></script>
    <script crossorigin src="./google-api.js" defer></script>
    <script crossorigin src="./script.js" defer></script>
  </head>
  <body class="bg-base-100 text-base-content flex min-h-screen min-w-155 flex-col">
    <header
      class="bg-base-300 border-base-content/25 sticky top-0 z-30 flex flex-wrap items-center gap-1.5 border-b px-2 py-1.5 shadow-md shadow-black/20">
      <span class="px-2 text-base font-bold">Multi Lang QA</span>
      <a
        class="btn btn-ghost btn-xs btn-circle"
        href="https://github.com/live-miracles/multi-lang-qa/"
        target="_blank"
        rel="noopener noreferrer"
        title="GitHub repository"
        aria-label="GitHub repository">
        <svg class="h-4 w-4" viewBox="0 0 98 96" fill="currentColor" aria-hidden="true">
          <path
            d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" />
        </svg>
      </a>
      <button
        id="add-q-btn"
        class="btn btn-primary btn-xs min-h-0 h-6 w-6 px-0"
        onclick="showAddQuestionForm()"
        title="Add question"
        aria-label="Add question">
        <svg
          aria-hidden="true"
          class="h-3.5 w-3.5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.25"
          stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 5v14" />
          <path d="M5 12h14" />
        </svg>
      </button>

      <section class="absolute left-1/2 flex -translate-x-1/2 items-center gap-1.5">
        <label class="swap cursor-pointer" title="Show original question text">
          <input id="show-q-text" type="checkbox" class="show-toggle" checked />
          <span class="swap-on btn btn-primary btn-xs min-h-0 h-6 w-6 px-0">
            <svg
              aria-hidden="true"
              class="h-3.5 w-3.5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="m5 8 6 6" />
              <path d="m4 14 6-6 2-3" />
              <path d="M2 5h12" />
              <path d="M7 2h1" />
              <path d="m22 22-5-10-5 10" />
              <path d="M14 18h6" />
            </svg>
          </span>
          <span class="swap-off btn btn-primary btn-xs btn-outline min-h-0 h-6 w-6 px-0">
            <svg
              aria-hidden="true"
              class="h-3.5 w-3.5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="m5 8 6 6" />
              <path d="m4 14 6-6 2-3" />
              <path d="M2 5h12" />
              <path d="M7 2h1" />
              <path d="m22 22-5-10-5 10" />
              <path d="M14 18h6" />
            </svg>
          </span>
        </label>

        <label class="swap cursor-pointer" title="Show completed questions">
          <input id="show-q-answered" type="checkbox" class="show-toggle" checked />
          <span class="swap-on btn btn-primary btn-xs min-h-0 h-6 w-6 px-0">
            <svg
              aria-hidden="true"
              class="h-3.5 w-3.5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.25"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <path d="M22 4 12 14.01l-3-3" />
            </svg>
          </span>
          <span class="swap-off btn btn-primary btn-xs btn-outline min-h-0 h-6 w-6 px-0">
            <svg
              aria-hidden="true"
              class="h-3.5 w-3.5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.25"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <path d="M22 4 12 14.01l-3-3" />
            </svg>
          </span>
        </label>

        <select id="filter-q-language" class="language-select select select-xs h-6 min-h-0 w-fit">
          <option selected value="All">All</option>
        </select>
      </section>

      <div class="ml-auto flex items-center gap-1.5">
        <label class="swap text-xs opacity-60">
          <input id="saving-badge" type="checkbox" disabled />
          <div class="swap-off"></div>
          <div class="swap-on flex items-center gap-1"><span class="loading loading-infinity loading-xs"></span>Saving</div>
        </label>

        <label class="swap btn btn-primary btn-xs btn-outline h-6 min-h-0 w-6 cursor-pointer px-0" title="Toggle theme" aria-label="Toggle theme">
          <input id="theme-checkbox" type="checkbox" />
          <svg
            class="swap-on h-3.5 w-3.5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.25"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <svg
            class="swap-off h-3.5 w-3.5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.25"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
          </svg>
        </label>

        <section class="border-base-content/25 flex h-6 overflow-hidden rounded-md border" aria-label="Zoom controls">
          <button
            id="zoom-out"
            class="btn btn-primary btn-xs btn-soft border-base-content/20 h-6 min-h-0 rounded-none border-0 border-r px-2"
            title="Zoom out">
            -
          </button>
          <button
            id="zoom-status"
            class="btn btn-primary btn-xs btn-soft border-base-content/20 h-6 min-h-0 w-14 rounded-none border-0 border-r px-1 font-mono"
            title="Reset zoom">
            100%
          </button>
          <button id="zoom-in" class="btn btn-primary btn-xs btn-soft h-6 min-h-0 rounded-none border-0 px-2" title="Zoom in">+</button>
        </section>

        <button
          id="toggle-fullscreen"
          class="btn btn-primary btn-xs btn-outline min-h-0 h-6 w-6 px-0"
          title="Toggle fullscreen (F11)"
          aria-label="Toggle fullscreen">
          <svg
            aria-hidden="true"
            class="h-3.5 w-3.5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.25"
            stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M8 3H5a2 2 0 0 0-2 2v3" />
            <path d="M16 3h3a2 2 0 0 1 2 2v3" />
            <path d="M21 16v3a2 2 0 0 1-2 2h-3" />
            <path d="M8 21H5a2 2 0 0 1-2-2v-3" />
          </svg>
        </button>
      </div>
    </header>

    <div id="loading-alert" role="alert" class="alert alert-info fixed top-3 left-1/2 z-40 hidden w-fit -translate-x-1/2 transform">
      <span class="loading loading-infinity loading-md"></span>
      <span class="msg">Loading...</span>
    </div>

    <div id="success-alert" role="alert" class="alert alert-success fixed top-3 left-1/2 z-40 hidden w-fit max-w-175 -translate-x-1/2 transform">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="msg"></span>
    </div>

    <div id="error-alert" role="alert" class="alert alert-error fixed top-3 left-1/2 z-40 hidden w-fit max-w-175 -translate-x-1/2 transform">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="msg"></span>
    </div>

    <dialog id="edit-q-modal" class="q-form modal">
      <div class="modal-box max-w-200">
        <input type="text" class="q-timestamp hidden" />
        <div class="q-form mx-auto mt-2 w-full max-w-200 space-y-3 px-4">
          <div class="grid grid-cols-3 items-center gap-4">
            <div class="flex flex-row gap-2">
              <select class="q-language language-select select select-primary text-primary select-sm w-fit"></select>
              <input type="text" placeholder="Person's Name" class="q-name input input-primary text-primary input-sm max-w-40 min-w-32" />
            </div>

            <div class="flex justify-center">
              <button type="button" id="translate-q-btn" class="btn btn-primary btn-soft btn-sm">Translate</button>
            </div>

            <div class="flex flex-row justify-end gap-2">
              <select class="translation-language language-select select select-sm w-fit"></select>
              <input type="text" placeholder="Name Translation" class="q-name-translation input input-sm max-w-40 min-w-32" />
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <textarea class="q-text textarea textarea-primary text-primary h-40 w-full resize-none" placeholder="*Question Text"></textarea>
            <textarea class="q-translation textarea h-40 w-full resize-none" placeholder="Question Translation"></textarea>
          </div>
        </div>

        <div class="modal-action">
          <div class="flex gap-3">
            <button type="button" class="btn" onclick="document.getElementById('edit-q-modal').close()">Cancel</button>
            <button type="button" id="update-q-btn" class="btn btn-primary">Add Question</button>
          </div>
        </div>
      </div>
    </dialog>

    <dialog id="delete-q-modal" class="modal">
      <div class="modal-box">
        <input type="text" class="q-timestamp hidden" />
        <p class="py-4">Do you want to delete this question?</p>
        <div class="modal-action">
          <form method="dialog" class="flex gap-3">
            <button class="btn">Cancel</button>
            <button id="delete-q-btn" class="btn btn-error">Yes</button>
          </form>
        </div>
      </div>
    </dialog>

    <dialog id="delete-all-q-modal" class="modal">
      <div class="modal-box max-w-lg border border-error/30">
        <form method="dialog">
          <button class="btn btn-sm btn-circle btn-ghost absolute top-2 right-2">
            <svg
              class="h-4 w-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </form>

        <div class="flex items-start gap-4">
          <div class="bg-error/15 text-error flex h-11 w-11 shrink-0 items-center justify-center rounded-md">
            <svg
              aria-hidden="true"
              class="h-6 w-6"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.25"
              stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" />
              <path d="M12 9v4" />
              <path d="M12 17h.01" />
            </svg>
          </div>
          <div class="min-w-0">
            <h3 class="text-lg font-semibold">Delete all questions?</h3>
            <p class="text-base-content/70 mt-1 text-sm">
              This removes every submitted question for the current session. This action cannot be undone.
            </p>
          </div>
        </div>

        <div class="border-base-content/10 bg-base-200 mt-5 rounded-md border p-4">
          <label class="form-control w-full">
            <span class="label-text text-base-content/70 mb-2 text-sm">
              Type <span class="text-error font-semibold">Delete all questions</span> to confirm
            </span>
            <input type="text" class="confirm-text input input-bordered input-sm w-full" autocomplete="off" />
          </label>
        </div>

        <div class="modal-action">
          <form method="dialog" class="flex w-full justify-end gap-2">
            <button class="btn btn-sm">Cancel</button>
            <button type="button" id="delete-all-q-btn" class="btn btn-error btn-sm">Delete all questions</button>
          </form>
        </div>
      </div>
    </dialog>

    <div id="no-questions" class="prose mx-auto mt-8 hidden w-full max-w-200 px-2 overflow-y-auto">
      <blockquote class="relative z-10 mx-auto w-fit">No Questions For The Day</blockquote>
      <img
        class="cat-img mx-auto -mt-10 h-64 w-64 object-contain"
        src="https://live-miracles.github.io/multi-lang-qa/funny-cat.svg"
        alt=""
        aria-hidden="true" />
    </div>

    <div id="questions" class="mx-auto mt-8 w-full max-w-200 px-2 flex flex-col overflow-y-auto">
      <div class="skeleton mb-5 h-32 w-full"></div>
      <div class="skeleton mb-5 h-32 w-full"></div>
      <div class="skeleton mb-5 h-32 w-full"></div>
    </div>

    <div class="flex gap-3 mx-auto mt-8 mb-4">
      <button id="delete-all" class="btn btn-sm btn-error" style="display: none" onclick="showDeleteAllQuestionsForm()">Delete All Questions</button>
    </div>

    <div aria-hidden="true" class="h-[90vh] shrink-0"></div>
  </body>
</html>
